- aid: tivo:tivo-music-metadata
  name: TiVo Music Metadata API
  description: The TiVo Music Metadata API provides access to high-quality music information including artist details, album
    data, track information, and music imagery. Uses the same HTTP-based query structure and JSON response format as the Video
    Metadata API v3.
  humanURL: https://tivo.stoplight.io/docs/music-metadata-api/ZG9jOjQ3NjAxNTk-introduction
  tags:
  - Music
  - Metadata
  - Entertainment
