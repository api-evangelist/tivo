apis:
- aid: tivo:tivo-video-metadata
  name: TiVo Video Metadata API
  description: The TiVo Video Metadata API v3 provides access to high-quality entertainment imagery and information for TV
    shows, movies, and episodes. Supports content search by metadata fields and precise ID-based lookup using Rovi 1.1, Rovi
    2.0, TMDB, and EIDR identifiers. Returns JSON responses for reliable, scalable entertainment experiences.
  humanURL: https://business.tivo.com/products-solutions/metadata/tv-movie-metadata-api
  baseURL: https://data.tivo.com
