aid: tivo
name: Tivo
description: TiVo provides a universe of high-quality entertainment imagery and information through its metadata APIs. The
  company offers Video Metadata API and Music Metadata API delivering TV, movie, and music content data for streaming platforms,
  smart TVs, IPTV systems, and entertainment applications.
