naftiko: "1.0.0-alpha1"

info:
  label: "TiVo Video Metadata API"
  description: >-
    TiVo Video Metadata API v3 providing entertainment content search, ID-based
    lookup, imagery, season and episode data, and person information for TV shows,
    movies, and other video content.
  tags:
    - Entertainment
    - Metadata
    - Television
    - Movies
    - Streaming
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TIVO_API_TOKEN: TIVO_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: tivo-video
      baseUri: https://data.tivo.com
      description: "TiVo Video Metadata REST API"
      authentication:
        type: bearer
        token: "{{TIVO_API_TOKEN}}"
      resources:
        - name: content-search
          path: /v3/content/search
          description: "Search for entertainment content by metadata fields"
          operations:
            - name: search-content
              method: GET
              description: "Search for TV shows, movies, and other content by flexible metadata fields"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Search query text"
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Content type: movie, series, episode, person, sport, program"
                - name: genre
                  in: query
                  type: string
                  required: false
                  description: "Genre filter"
                - name: year
                  in: query
                  type: integer
                  required: false
                  description: "Release year filter"
                - name: language
                  in: query
                  type: string
                  required: false
                  description: "Language code (ISO 639-1)"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: include
                  in: query
                  type: string
                  required: false
                  description: "Additional fields to include"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: content-lookup
          path: /v3/content/{contentId}
          description: "Retrieve content by known identifier"
          operations:
            - name: lookup-content-by-id
              method: GET
              description: "Look up content metadata using a known Rovi, TMDB, or EIDR identifier"
              inputParameters:
                - name: contentId
                  in: path
                  type: string
                  required: true
                  description: "Content identifier"
                - name: idType
                  in: query
                  type: string
                  required: false
                  description: "Identifier type: rovi, rovi2, tmdb, eidr"
                - name: include
                  in: query
                  type: string
                  required: false
                  description: "Additional fields: cast, images"
                - name: language
                  in: query
                  type: string
                  required: false
                  description: "Language for localized metadata"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: content-images
          path: /v3/content/{contentId}/images
          description: "Retrieve entertainment imagery"
          operations:
            - name: get-content-images
              method: GET
              description: "Get posters, backdrops, stills, and other images for a content item"
              inputParameters:
                - name: contentId
                  in: path
                  type: string
                  required: true
                  description: "Content identifier"
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Image type: poster, backdrop, still, headshot, logo"
                - name: width
                  in: query
                  type: integer
                  required: false
                  description: "Preferred image width in pixels"
                - name: height
                  in: query
                  type: integer
                  required: false
                  description: "Preferred image height in pixels"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: content-seasons
          path: /v3/content/{contentId}/seasons
          description: "Retrieve TV series season data"
          operations:
            - name: get-content-seasons
              method: GET
              description: "Get season information for a TV series"
              inputParameters:
                - name: contentId
                  in: path
                  type: string
                  required: true
                  description: "Series content identifier"
                - name: language
                  in: query
                  type: string
                  required: false
                  description: "Language code for localized data"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: content-episodes
          path: /v3/content/{contentId}/episodes
          description: "Retrieve TV series episode listings"
          operations:
            - name: get-content-episodes
              method: GET
              description: "Get episode listings for a TV series or season"
              inputParameters:
                - name: contentId
                  in: path
                  type: string
                  required: true
                  description: "Series content identifier"
                - name: season
                  in: query
                  type: integer
                  required: false
                  description: "Season number to filter"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum episodes to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: person-lookup
          path: /v3/people/{personId}
          description: "Retrieve person metadata"
          operations:
            - name: lookup-person
              method: GET
              description: "Get biography, filmography, and images for a person"
              inputParameters:
                - name: personId
                  in: path
                  type: string
                  required: true
                  description: "Person identifier"
                - name: include
                  in: query
                  type: string
                  required: false
                  description: "Additional fields: credits, images, biography"
                - name: language
                  in: query
                  type: string
                  required: false
                  description: "Language code for localized data"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: tivo-video-api
      resources:
        - path: /v1/content/search
          name: content-search
          description: "Search entertainment content"
          operations:
            - method: GET
              name: search-content
              description: "Search for entertainment content"
              call: "tivo-video.search-content"
              with:
                q: "rest.q"
                type: "rest.type"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/content/{contentId}
          name: content
          description: "Content lookup by ID"
          operations:
            - method: GET
              name: lookup-content-by-id
              description: "Look up content by identifier"
              call: "tivo-video.lookup-content-by-id"
              with:
                contentId: "rest.contentId"
                idType: "rest.idType"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/content/{contentId}/images
          name: content-images
          description: "Content imagery"
          operations:
            - method: GET
              name: get-content-images
              description: "Get images for content"
              call: "tivo-video.get-content-images"
              with:
                contentId: "rest.contentId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/content/{contentId}/seasons
          name: content-seasons
          description: "TV series seasons"
          operations:
            - method: GET
              name: get-content-seasons
              description: "Get seasons for a TV series"
              call: "tivo-video.get-content-seasons"
              with:
                contentId: "rest.contentId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/content/{contentId}/episodes
          name: content-episodes
          description: "TV series episodes"
          operations:
            - method: GET
              name: get-content-episodes
              description: "Get episodes for a TV series"
              call: "tivo-video.get-content-episodes"
              with:
                contentId: "rest.contentId"
                season: "rest.season"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/people/{personId}
          name: person
          description: "Person lookup"
          operations:
            - method: GET
              name: lookup-person
              description: "Get person details"
              call: "tivo-video.lookup-person"
              with:
                personId: "rest.personId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: tivo-video-mcp
      transport: http
      tools:
        - name: search-content
          description: "Search TiVo for entertainment content by title, genre, year, or type"
          hints:
            readOnly: true
            openWorld: true
          call: "tivo-video.search-content"
          with:
            q: "tools.q"
            type: "tools.type"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: lookup-content-by-id
          description: "Look up TiVo content metadata using a Rovi, TMDB, or EIDR identifier"
          hints:
            readOnly: true
            openWorld: false
          call: "tivo-video.lookup-content-by-id"
          with:
            contentId: "tools.contentId"
            idType: "tools.idType"
            include: "tools.include"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-content-images
          description: "Retrieve entertainment imagery (posters, backdrops, stills) for a content item"
          hints:
            readOnly: true
            openWorld: false
          call: "tivo-video.get-content-images"
          with:
            contentId: "tools.contentId"
            type: "tools.type"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-content-seasons
          description: "Get season information and episode counts for a TV series"
          hints:
            readOnly: true
            openWorld: false
          call: "tivo-video.get-content-seasons"
          with:
            contentId: "tools.contentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-content-episodes
          description: "List episodes for a TV series or specific season with air dates and descriptions"
          hints:
            readOnly: true
            openWorld: false
          call: "tivo-video.get-content-episodes"
          with:
            contentId: "tools.contentId"
            season: "tools.season"
          outputParameters:
            - type: object
              mapping: "$."
        - name: lookup-person
          description: "Get biography, credits, and images for a cast member or crew person"
          hints:
            readOnly: true
            openWorld: false
          call: "tivo-video.lookup-person"
          with:
            personId: "tools.personId"
            include: "tools.include"
          outputParameters:
            - type: object
              mapping: "$."
